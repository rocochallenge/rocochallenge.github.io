<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoCo 2026 Brick Assembly Documentation</title>

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #fafafa;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    }
    .content { display: flex; flex: 1; overflow: hidden; }
    aside {
      width: 250px;
      background-color: #f8f9fa;
      border-right: 1px solid #e5e7eb;
      padding: 1rem;
      overflow-y: auto;
    }
    main {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      background-color: white;
    }
    pre {
      background-color: #f6f8fa !important;
      border-radius: 8px;
      padding: 1em;
      overflow-x: auto;
      border: 1px solid #e5e7eb;
    }
    code {
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.9rem;
    }
    html { scroll-behavior: smooth; }

    /* Sidebar */
    .active-link { color: #2563eb; font-weight: 600; }
    .sidebar-file { cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 4px; display: block; }
    .sidebar-file:hover { background-color: #e0e7ff; }
    .active-file { background-color: #c7d2fe; font-weight: 600; }

    /* Markdown Heading Styles */
    .markdown h1 { font-size: 2.25rem; font-weight: 700; margin-top: 2em; margin-bottom: 0.8em; color: #1f2937; scroll-margin-top: 90px; }
    .markdown h2 { font-size: 1.875rem; font-weight: 700; margin-top: 1.8em; margin-bottom: 0.7em; color: #1f2937; scroll-margin-top: 90px; }
    .markdown h3 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5em; margin-bottom: 0.6em; color: #1f2937; scroll-margin-top: 90px; }
    .markdown p { margin-bottom: 1em; line-height: 1.6; color: #374151; }
    .markdown ul { list-style: disc; padding-left: 1.25rem; margin-bottom: 1em; }
    .markdown li { margin-bottom: 0.5em; }

    @media (max-width: 768px) {
      body { height: auto; min-height: 100vh; }
      header { padding-left: 1rem !important; padding-right: 1rem !important; }
      .content { flex-direction: column; overflow: visible; }
      aside { width: 100%; max-height: 36vh; border-right: 0; border-bottom: 1px solid #e5e7eb; }
      main { width: 100%; max-width: 100vw; padding: 1.25rem; box-sizing: border-box; overflow-x: auto; }
      .markdown { overflow-wrap: anywhere; }
      .markdown h1, .markdown h2, .markdown h3, .markdown p, .markdown li { max-width: min(340px, calc(100vw - 40px)); }
      .markdown h1 { font-size: 1.75rem; }
      .markdown h2 { font-size: 1.45rem; }
      .markdown h3 { font-size: 1.2rem; }
      .markdown img, .markdown table { max-width: 100%; }
    }
  </style>
</head>

<body>
  <header class="w-full bg-white shadow-sm flex items-center justify-between px-8 py-3">
    <div class="flex items-center space-x-6">
      <a href="index.html" class="font-semibold text-xl text-blue-600">RoCo @ IROS 2026</a>
    </div>
  </header>

  <div class="content">
    <aside>
      <h2 class="text-gray-700 font-semibold mb-4">Brick Assembly</h2>
      <div id="file-list" class="mb-4">
        <span class="sidebar-file active-file" data-file="brick_docs/overview.md">Overview</span>
      </div>
      <ul id="sidebar-links" class="space-y-2 text-sm"></ul>
    </aside>

    <main id="markdown-content" class="markdown max-w-none"></main>
  </div>

   <script>
    const content = document.getElementById('markdown-content');
    const sidebar = document.getElementById('sidebar-links');
    let headers = [];

    function loadMarkdown(file) {
      fetch(file)
        .then(res => {
          if (!res.ok) throw new Error('Failed to load markdown: ' + file);
          return res.text();
        })
        .then(md => {
          // Render Markdown
          content.innerHTML = marked.parse(md, {
            highlight: (code, lang) => hljs.highlightAuto(code, [lang]).value
          });
          hljs.highlightAll();

          // === ADDED: DataTables Initialization ===
          if (document.getElementById('leaderboard')) {
              if ($.fn.DataTable.isDataTable('#leaderboard')) {
                  $('#leaderboard').DataTable().destroy();
              }
              
              var table = $('#leaderboard').DataTable({
                  "ajax": {
                      "url": "brick_docs/leaderboard.json", 
                      "dataSrc": ""  
                  },
                  "columns": [
                      /* 1. Unbind JSON rank (DataTables will control this column) */
                      { "data": null, "defaultContent": "", "searchable": false, "orderable": false },
                      { "data": "team" },
                      { "data": "affiliation"},
                      { "data": "robot" },
                      { "data": "type1" },
                      { "data": "type2" },
                      { 
                          "data": "runtime",
                          "render": function(data, type, row) {
                              if (type === 'sort') return parseFloat(data); 
                              return data;
                          }
                      },
                      { 
                          "data": "score", /* Score Column */
                          "render": function(data, type, row) {
                              if (type === 'sort') return parseFloat(data); 
                              return data;
                          }
                      },
                      { "data": "date" },
                  ],
                  "order": [
                      [ 7, "desc" ], /* Primary: Success Rate (Highest first) */
                      [ 6, "asc" ]   /* Tiebreaker: Assembly Time (Fastest first) */
                  ],
                  "paging": false,
                  "info": false,
                  "searching": false
              });

              /* Advanced Tie-Breaking Logic */
              table.on('draw.dt', function () {
                  // Fetch the sorted row data and the physical HTML cells
                  let rows = table.rows({ search: 'applied', order: 'applied' }).data();
                  let cells = table.column(0, { search: 'applied', order: 'applied' }).nodes();

                  let currentRank = 1;
                  let previousScore = null;
                  let previousTime = null;

                  for (let i = 0; i < rows.length; i++) {
                      // Parse the data for mathematical comparison
                      let currentScore = parseFloat(rows[i].score);
                      let currentTime = parseFloat(rows[i].runtime);

                      if (i > 0) {
                          // Check if both score and time perfectly match the previous row
                          if (currentScore === previousScore && currentTime === previousTime) {
                              // It's a tie! Keep currentRank the same.
                          } else {
                              // Not a tie. Jump the rank to the current row position.
                              currentRank = i + 1;
                          }
                      }

                      // Store current values to compare against the next row
                      previousScore = currentScore;
                      previousTime = currentTime;

                      // Assign the text and medals
                      let rankText = currentRank;
                      cells[i].innerHTML = rankText;
                  }
              });
          }
          // ========================================
          // ========================================
          // ========================================

          // Clear old navigation
          sidebar.innerHTML = '';
          headers = content.querySelectorAll('h1, h2');
          headers.forEach((h) => {
            const id = h.textContent.trim().replace(/\s+/g, '-').toLowerCase();
            h.id = id;

            const li = document.createElement('li');
            li.innerHTML = `<a href="#${id}" class="hover:underline block text-gray-700">${h.textContent}</a>`;
            sidebar.appendChild(li);
          });

          // Highlight current
          highlightCurrent();
        })
        .catch(err => console.error(err));
    }

    function highlightCurrent() {
      let current = '';
      headers.forEach(h => {
        const rect = h.getBoundingClientRect();
        if (rect.top <= 120) current = h.id;
      });
      document.querySelectorAll('#sidebar-links a').forEach(a => {
        a.classList.remove('active-link');
        if (a.getAttribute('href') === '#' + current) {
          a.classList.add('active-link');
        }
      });
    }

    // Scroll listener
    window.addEventListener('scroll', highlightCurrent, { passive: true });

    // File switch event
    const fileList = document.querySelectorAll('.sidebar-file');
    fileList.forEach(el => {
      el.addEventListener('click', () => {
        fileList.forEach(f => f.classList.remove('active-file'));
        el.classList.add('active-file');
        loadMarkdown(el.dataset.file);
      });
    });

    // Default load first file
    loadMarkdown(fileList[0].dataset.file);
  </script>
</body>
</html>
